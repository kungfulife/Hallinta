<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallinta</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="phraseManager.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
<div class="container">
  <h1>Hallinta</h1>
  <div class="header" id="app-header">
    <input type="text" class="search-bar" placeholder="Filter Mods by name..." oninput="filterMods()">
    <div class="buttons">
      <button onclick="changeView('settings')">Settings</button>
    </div>
  </div>

  <div class="preset-selector" id="preset-selector">
    <div class="preset-controls">
      <select id="preset-dropdown" onchange="onPresetChange()"></select>
      <button onclick="renameCurrentPreset()" title="Rename Preset">✏️</button>
      <button onclick="deleteCurrentPreset()" title="Delete Preset">🗑️</button>
    </div>
  </div>

  <div class="main-content" id="main-page">
    <div class="mod-list">
      <div class="mod-count" id="mod-count">Total Mods: 0</div>
      <ul id="mod-list">
        <!-- Mods will be dynamically loaded here -->
      </ul>
    </div>

    <div class="sidebar">
      <div class="split-button">
        <button class="split-btn-main" onclick="importRegular()">Import</button>
<!--        <button class="split-btn-steam disabled" onclick="importSteam()">-->
<!--          <img src="assets/steam-icon.png" alt="Steam" width="16" height="16">-->
<!--        </button>-->
      </div>
      <button onclick="exportModList()">Export</button>
<!--      <button class="download-missing disabled">Download Missing</button>-->

      <hr class="sidebar-separator">

      <button onclick="restoreBackup()">Restore Backup</button>
      <button onclick="createBackup()">Create Backup</button>
      <button onclick="backupMonitor()">
        <span id="backup-monitor-status">Back up Monitor</span>
      </button>
    </div>
  </div>

  <div class="settings-page" id="settings-page">
    <h2>Noita Saved Data Directory</h2>
    <input type="text" id="noita-dir" placeholder="Enter Noita save directory (save00 folder)">
    <div class="button-group">
      <button onclick="changeDirectory('noita')">Change</button>
      <button onclick="openDirectory('noita')">Open</button>
    </div>

    <h2>Entangled Worlds Directory</h2>
    <input type="text" id="entangled-dir" placeholder="Enter Entangled Worlds directory">
    <div class="button-group">
      <button onclick="changeDirectory('entangled')">Change</button>
      <button onclick="openDirectory('entangled')">Open</button>
    </div>

    <h2>Appearance</h2>
    <div class="dark-mode-toggle">
      <label class="toggle-switch">
        <input type="checkbox" id="dark-mode-checkbox" onchange="toggleDarkMode()">
        <span class="slider">
          <span class="toggle-text">🌙</span>
          <span class="toggle-text">☀️</span>
        </span>
      </label>
      <span class="toggle-label">Dark Mode</span>
    </div>

    <div class="button-group">
      <button onclick="resetToDefaults()">Reset to defaults</button>
    </div>

    <button id="save-close-btn" onclick="saveAndClose()">Save & Close</button>
  </div>

  <div id="context-menu" class="context-menu">
    <button onclick="toggleModEnabled()">Enable/Disable</button>
    <button onclick="reorderMod()">Reorder</button>
    <button onclick="deleteMod()">Delete</button>
    <button onclick="openWorkshop()">Open Workshop Link</button>
    <button onclick="copyWorkshopLink()">Copy Workshop Link</button>
  </div>

  <div class="status-bar" id="status-bar">Ready - Loaded from Noita XML file</div>
</div>
</body>
</html>
