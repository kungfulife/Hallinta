<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halinta</title>
  <link rel="stylesheet" href="styles.css">
  <script type="text/javascript" src="./tauri.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
<div class="container">
  <h1>Halinta</h1>
  <div class="header" id="app-header">
    <div class="buttons">
      <input type="text" class="search-bar" placeholder="Filter Mods by name...">
      <button onclick="changeView('main')">Preset</button>
      <button onclick="changeView('default')">Default</button>
      <button onclick="changeView('settings')">Settings</button>
    </div>
  </div>

  <div class="main-content" id="main-page">
    <div class="mod-list">
      <ul id="mod-list">
        <li>Example Mod <span>(Local Mod)</span></li>
        <li>Example Mod ID: 125893737 <span>(Workshop ID: 125893737)</span></li>
        <li>Example Mod ID: 2358374523 <span>(Workshop ID: 2358374523)</span></li>
      </ul>
    </div>

    <div class="sidebar">
      <button class="import-btn">Import <img src="assets/steam-icon.png" alt="Steam" width="32" height="32"></button>
      <button>Export</button>
      <button>Backup Monitor</button>
      <button>Restore Backup</button>
      <button class="download-missing">Download Missing</button>
    </div>
    <div class="status-bar" id="status-bar">Ready - Loaded from Noita XML file</div>
  </div>

  <div class="settings-page" id="settings-page">
    <h2>Noita Directory</h2>
    <input type="text" id="noita-dir" placeholder="Enter Noita directory">
    <button onclick="changeDirectory('noita')">Change</button>
    <button onclick="openDirectory('noita')">Open</button>
    <h2>Entangled Worlds Directory</h2>
    <input type="text" id="entangled-dir" placeholder="Enter Entangled Worlds directory">
    <button onclick="changeDirectory('entangled')">Change</button>
    <button onclick="openDirectory('entangled')">Open</button>
    <button onclick="resetToDefaults()">Reset to defaults</button>
    <button id="save-close-btn" onclick="saveAndClose()">Save & Close</button>
  </div>

  <div id="context-menu" class="context-menu">
    <button>Disable</button>
    <button>Reorder</button>
    <button>Delete</button>
    <button>Workshop</button>
  </div>
</div>
</body>
</html>
