<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallinta - Application Logs</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/settings.css">
    <script src="js/logUtils.js"></script>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }
        .log-window-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1rem;
        }
        .log-window-container #lw-log-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            flex: 1;
            line-height: 1.6;
            overflow-y: auto;
            padding: 0.5rem 0;
            min-height: 0;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="log-window-container">
    <div class="log-header">
        <h3>Application Logs</h3>
        <div class="log-controls">
            <button id="lw-copy-btn" title="Copy Logs">📋</button>
            <button id="lw-return-btn" title="Return logs to main app window">Return to App</button>
        </div>
    </div>
    <div class="log-filters">
        <label class="log-level-filter-label">Show:</label>
        <select id="lw-filter-level" class="log-level-select">
            <option value="DEBUG">DEBUG</option>
            <option value="INFO" selected>INFO</option>
            <option value="WARN">WARN</option>
            <option value="ERROR">ERROR</option>
        </select>
        <input type="text" id="lw-search" placeholder="Search logs..." class="log-search-input">
    </div>
    <div id="lw-log-content"></div>
</div>
<script>
    async function initLogWindow() {
        let currentLogLevel = 'INFO';

        try {
            const settings = await window.__TAURI__.core.invoke('load_settings');
            if (settings.dark_mode) {
                document.body.classList.add('dark-mode');
            }
            currentLogLevel = settings.log_settings?.log_level || 'INFO';
        } catch (e) {
            // Defaults to light mode and INFO level
        }

        window.logUtils.initLogFilterDropdown(['lw-filter-level'], currentLogLevel);

        const refreshLogs = async () => {
            try {
                const logs = await window.__TAURI__.core.invoke('get_log_entries');
                const logContent = document.getElementById('lw-log-content');
                if (!logContent) return;

                const selectedLevel = document.getElementById('lw-filter-level')?.value || 'INFO';
                const searchText = document.getElementById('lw-search')?.value || '';

                const isNearBottom = logContent.scrollTop + logContent.clientHeight >= logContent.scrollHeight - 30;
                logContent.innerHTML = window.logUtils.buildLogHTML(logs, selectedLevel, searchText);

                if (isNearBottom) {
                    logContent.scrollTop = logContent.scrollHeight;
                }
            } catch (error) {
                const logContent = document.getElementById('lw-log-content');
                if (logContent) {
                    logContent.innerHTML = '<div class="log-line log-error"><span class="log-msg">Error loading logs.</span></div>';
                }
            }
        };

        // Copy button
        document.getElementById('lw-copy-btn').addEventListener('click', async () => {
            const logContent = document.getElementById('lw-log-content');
            if (!logContent) return;
            const logLines = logContent.querySelectorAll('.log-line');
            const text = Array.from(logLines).map(line => line.textContent).join('\n');
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                // Ignore clipboard errors
            }
        });

        // Return to App button — emit event to main window, then close this window
        document.getElementById('lw-return-btn').addEventListener('click', async () => {
            try {
                await window.__TAURI__.event.emit('log-return-to-app');
                // The main window will close us after receiving the event
            } catch (e) {
                // If event fails, just close
                const currentWindow = window.__TAURI__.webviewWindow.getCurrentWebviewWindow();
                await currentWindow.close();
            }
        });

        // Filter/search event listeners
        const filterEl = document.getElementById('lw-filter-level');
        if (filterEl) filterEl.addEventListener('change', refreshLogs);

        const searchEl = document.getElementById('lw-search');
        if (searchEl) searchEl.addEventListener('input', refreshLogs);

        // Initial load + auto-refresh
        refreshLogs();
        setInterval(refreshLogs, 1500);
    }

    document.addEventListener('DOMContentLoaded', initLogWindow);
</script>
</body>
</html>
